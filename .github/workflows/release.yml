name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Ember
        run: swift build -c release

      - name: Assemble app bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p Ember.app/Contents/MacOS
          mkdir -p Ember.app/Contents/Resources
          cp .build/release/Ember Ember.app/Contents/MacOS/
          cp -R Resources/themes Ember.app/Contents/Resources/themes || true
          cp Resources/Ember.icns Ember.app/Contents/Resources/ || true
          if [ -d ".build/release/Sparkle.framework" ]; then
            mkdir -p Ember.app/Contents/Frameworks
            cp -R .build/release/Sparkle.framework Ember.app/Contents/Frameworks/
          fi
          sed "s/__VERSION__/${APP_VERSION}/g" Resources/Info.plist > Ember.app/Contents/Info.plist

      - name: Fix framework paths and sign
        run: |
          install_name_tool -add_rpath "@executable_path/../Frameworks" Ember.app/Contents/MacOS/Ember 2>/dev/null || true
          codesign --force --deep --sign - --identifier com.arcimun.ember Ember.app

      - name: Create DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          brew install create-dmg
          mkdir -p staging
          cp -r Ember.app staging/
          create-dmg \
            --volname "Ember" \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 380 150 \
            --icon "Ember.app" 120 150 \
            --no-internet-enable \
            "Ember-${APP_VERSION}.dmg" \
            staging/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "Ember-*.dmg"
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap update"
            exit 0
          fi
          DMG_FILE=$(ls Ember-*.dmg 2>/dev/null | head -1)
          [ -z "$DMG_FILE" ] && exit 0
          SHA256=$(shasum -a 256 "$DMG_FILE" | cut -d' ' -f1)

          # Clone tap, update cask, push
          git clone "https://x-access-token:${GH_TOKEN}@github.com/arcimun/homebrew-tap.git" /tmp/tap
          cat > /tmp/tap/Casks/ember.rb << RUBY
          cask "ember" do
            version "${APP_VERSION}"
            sha256 "${SHA256}"
            url "https://github.com/arcimun/ember/releases/download/v#{version}/Ember-#{version}.dmg"
            name "Ember"
            desc "Voice-to-text for macOS. Groq Whisper STT with LLM grammar correction."
            homepage "https://github.com/arcimun/ember"
            app "Ember.app"
            auto_updates true
          end
          RUBY
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ember.rb
          git commit -m "Update Ember to v${APP_VERSION}" || true
          git push
