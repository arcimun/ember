name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Ember
        run: swift build -c release

      - name: Assemble app bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p Ember.app/Contents/MacOS
          mkdir -p Ember.app/Contents/Resources
          cp .build/release/Ember Ember.app/Contents/MacOS/
          cp -R Resources/themes Ember.app/Contents/Resources/themes || true
          cp Resources/Ember.icns Ember.app/Contents/Resources/ || true
          # Copy all frameworks generically (handles Sparkle, KeyboardShortcuts, WhisperKit, and future additions)
          mkdir -p Ember.app/Contents/Frameworks
          find .build/release -maxdepth 1 -name "*.framework" | while read fw; do
            cp -R "$fw" Ember.app/Contents/Frameworks/
          done
          sed "s/__VERSION__/${APP_VERSION}/g" Resources/Info.plist > Ember.app/Contents/Info.plist

      - name: Fix framework paths and sign
        run: |
          install_name_tool -add_rpath "@executable_path/../Frameworks" Ember.app/Contents/MacOS/Ember 2>/dev/null || true
          codesign --force --deep --sign - --identifier com.arcimun.ember Ember.app

      - name: Create DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          brew install create-dmg
          mkdir -p staging
          cp -r Ember.app staging/
          create-dmg \
            --volname "Ember" \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 380 150 \
            --icon "Ember.app" 120 150 \
            --no-internet-enable \
            "Ember-${APP_VERSION}.dmg" \
            staging/ || true

      - name: Sign DMG and update appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY not set — skipping appcast update"
            exit 0
          fi

          DMG_FILE=$(ls Ember-*.dmg 2>/dev/null | head -1)
          [ -z "$DMG_FILE" ] && { echo "No DMG found"; exit 0; }

          # Find sign_update in Sparkle build artifacts
          SIGN_UPDATE=$(find .build -name "sign_update" -type f 2>/dev/null | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            # Download from Sparkle release as fallback
            curl -sL "https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-2.7.5.tar.xz" | tar xJ -C /tmp
            SIGN_UPDATE="/tmp/bin/sign_update"
          fi
          chmod +x "$SIGN_UPDATE"

          # Sign the DMG — outputs edSignature and length
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" "$DMG_FILE" -f -)
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          FILE_LENGTH=$(wc -c < "$DMG_FILE" | tr -d ' ')
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S %z")

          # Generate new appcast.xml with this version on top
          cat > appcast.xml << APPCAST_EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/" version="2.0">
            <channel>
              <title>Ember</title>
              <link>https://raw.githubusercontent.com/arcimun/ember/main/appcast.xml</link>
              <description>Ember voice-to-text updates</description>
              <language>en</language>
              <item>
                <title>Version ${APP_VERSION}</title>
                <sparkle:version>${APP_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${APP_VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="https://github.com/arcimun/ember/releases/download/v${APP_VERSION}/Ember-${APP_VERSION}.dmg"
                  type="application/octet-stream"
                  sparkle:edSignature="${ED_SIGNATURE}"
                  length="${FILE_LENGTH}"
                />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' appcast.xml

          echo "✅ appcast.xml updated for v${APP_VERSION}"
          cat appcast.xml

      - name: Commit appcast.xml to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet appcast.xml 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git fetch origin main
            git checkout main
            git add appcast.xml
            git commit -m "chore: update appcast.xml for v$(cat VERSION | tr -d '[:space:]')"
            git push origin main
          else
            echo "appcast.xml unchanged — skipping commit"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "Ember-*.dmg"
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap update"
            exit 0
          fi
          DMG_FILE=$(ls Ember-*.dmg 2>/dev/null | head -1)
          [ -z "$DMG_FILE" ] && exit 0
          SHA256=$(shasum -a 256 "$DMG_FILE" | cut -d' ' -f1)

          # Clone tap, update cask, push
          git clone "https://x-access-token:${GH_TOKEN}@github.com/arcimun/homebrew-tap.git" /tmp/tap
          cat > /tmp/tap/Casks/ember.rb << RUBY
          cask "ember" do
            version "${APP_VERSION}"
            sha256 "${SHA256}"
            url "https://github.com/arcimun/ember/releases/download/v#{version}/Ember-#{version}.dmg"
            name "Ember"
            desc "Voice-to-text for macOS. Groq Whisper STT with LLM grammar correction."
            homepage "https://github.com/arcimun/ember"
            app "Ember.app"
            auto_updates true
          end
          RUBY
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ember.rb
          git commit -m "Update Ember to v${APP_VERSION}" || true
          git push
