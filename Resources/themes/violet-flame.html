<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent !important; }
canvas { position: fixed; top: 0; left: 0; background: transparent !important; }
</style>
</head><body>
<canvas id="gl"></canvas>
<script>
// ═══════════════════════════════════════════════
// Violet Flame — GLSL edge shader overlay
// Pure violet/amethyst, NO yellow, transparent center
// ═══════════════════════════════════════════════

const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', { alpha: true, premultipliedAlpha: false, antialias: true });
if (!gl) { document.body.innerText = 'WebGL2 required'; }

let W, H, audioLevel = 0, smoothAudio = 0, active = false, fadeProgress = 0, processing = false;

function resize() {
  const dpr = window.devicePixelRatio || 2;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.onresize = resize;

// ── Shaders ──
const VS = `#version 300 es
in vec2 a_pos;
out vec2 vUv;
void main() { vUv = a_pos * 0.5 + 0.5; gl_Position = vec4(a_pos, 0, 1); }`;

const FS = `#version 300 es
precision highp float;
in vec2 vUv;
out vec4 fragColor;

uniform float uTime;
uniform float uAudio;
uniform float uFade;
uniform float uProcessing;
uniform vec2 uRes;

// Simplex noise
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}

float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0,0.5,1,2);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+2.0*C.xxx;vec3 x3=x0-1.0+3.0*C.xxx;
  i=mod289(i);
  vec4 p=permute(permute(permute(i.z+vec4(0,i1.z,i2.z,1))+i.y+vec4(0,i1.y,i2.y,1))+i.x+vec4(0,i1.x,i2.x,1));
  float n_=1.0/7.0;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m=m*m;return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

void main() {
  vec2 uv = vUv;
  vec2 aspect = vec2(uRes.x / uRes.y, 1.0);

  // Distance from nearest edge (0 at edge, 0.5 at center)
  float dT = uv.y;
  float dB = 1.0 - uv.y;
  float dL = uv.x;
  float dR = 1.0 - uv.x;
  float dEdge = min(min(dT, dB), min(dL, dR));

  // Flame depth: 7-12% — visible but controlled
  float depth = 0.07 + uAudio * 0.05;

  // Base flame shape
  float flame = 1.0 - smoothstep(0.0, depth, dEdge);

  // Organic noise deformation (3 octaves)
  vec2 noiseCoord = uv * aspect;
  float n1 = snoise(vec3(noiseCoord * 4.0, uTime * 0.6)) * 0.5 + 0.5;
  float n2 = snoise(vec3(noiseCoord * 8.0, uTime * 1.0 + 5.0)) * 0.5 + 0.5;
  float n3 = snoise(vec3(noiseCoord * 16.0, uTime * 1.5 + 10.0)) * 0.5 + 0.5;

  // Noise creates organic flame tendrils — audio increases WAVE amplitude
  float waveBoost = 1.0 + uAudio * 2.0;  // waves get bigger with voice
  float noiseMask = n1 * 0.6 + n2 * 0.3 * waveBoost + n3 * 0.1 * waveBoost;
  flame = flame * (0.4 + noiseMask * 0.6);
  flame += noiseMask * 0.1 * (1.0 - smoothstep(0.0, depth * 1.5, dEdge));

  // Audio boosts intensity moderately — visible but not overwhelming
  flame *= (0.8 + uAudio * 0.4);
  flame = clamp(flame, 0.0, 0.75);  // cap: stays in violet range, never white

  flame = clamp(flame, 0.0, 1.0);

  // ── COLORS: violet (listening) or orange (processing) ──
  // Processing mode: shift to warm orange
  float pm = uProcessing;

  // Rich violet palette — visible but never white
  vec3 deepIndigo = mix(vec3(0.12, 0.04, 0.25), vec3(0.25, 0.08, 0.03), pm);
  vec3 violet     = mix(vec3(0.35, 0.12, 0.55), vec3(0.55, 0.22, 0.06), pm);
  vec3 amethyst   = mix(vec3(0.55, 0.28, 0.70), vec3(0.80, 0.40, 0.12), pm);
  vec3 orchid     = mix(vec3(0.70, 0.38, 0.80), vec3(0.92, 0.55, 0.15), pm);
  vec3 hotWhite   = mix(vec3(0.80, 0.55, 0.90), vec3(0.95, 0.65, 0.25), pm);  // lilac, not white

  vec3 color;
  float t = flame;
  if (t < 0.15) {
    color = mix(deepIndigo, violet, t / 0.15);
  } else if (t < 0.4) {
    color = mix(violet, amethyst, (t - 0.15) / 0.25);
  } else if (t < 0.7) {
    color = mix(amethyst, orchid, (t - 0.4) / 0.3);
  } else {
    color = mix(orchid, hotWhite, (t - 0.7) / 0.3);
  }

  // Shimmer from noise
  color += vec3(n3 * 0.08, n2 * 0.03, n1 * 0.12) * flame;

  // Breathing — stronger presence
  float breath = 0.85 + 0.15 * sin(uTime * 0.4);

  // Final alpha: 0 in center, flame at edges
  float alpha = flame * breath * uFade;

  // Smooth fade to zero — no hard cutoff, natural falloff
  alpha *= smoothstep(depth * 1.8, depth * 0.2, dEdge);

  fragColor = vec4(color * alpha, alpha);
}`;

// ── Setup WebGL ──
function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog); gl.useProgram(prog);

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'uTime');
const uAudio = gl.getUniformLocation(prog, 'uAudio');
const uFade = gl.getUniformLocation(prog, 'uFade');
const uProc = gl.getUniformLocation(prog, 'uProcessing');
const uRes = gl.getUniformLocation(prog, 'uRes');
let smoothProcessing = 0;
// D2: RAF handle — null when loop is stopped to save battery
let rafHandle = null;

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

function render() {
  rafHandle = requestAnimationFrame(render);

  // Smooth audio
  smoothAudio = audioLevel > smoothAudio
    ? smoothAudio * 0.3 + audioLevel * 0.7
    : smoothAudio * 0.93 + audioLevel * 0.07;

  // Fade: fast in (ease-out), smooth out
  if (active && fadeProgress < 1) fadeProgress = Math.min(1, fadeProgress + 0.06);  // ~0.5s in
  if (!active && fadeProgress > 0) fadeProgress = Math.max(0, fadeProgress - 0.02);  // ~1.5s out

  // Processing mode transition
  smoothProcessing += (processing ? 1 : 0 - smoothProcessing) * 0.05;

  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);

  if (fadeProgress > 0.01) {
    const t = performance.now() / 1000;
    gl.uniform1f(uTime, t);
    gl.uniform1f(uAudio, Math.min(smoothAudio * 3, 0.8));  // capped — no whitewash
    gl.uniform1f(uFade, fadeProgress);
    gl.uniform1f(uProc, smoothProcessing);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  } else if (!active) {
    // D2: Nothing to render and overlay hidden — stop RAF loop to save battery
    cancelAnimationFrame(rafHandle);
    rafHandle = null;
  }
}
render();

// D2: Helper to restart RAF loop if it was stopped
function ensureRafRunning() {
  if (rafHandle === null) render();
}

// API
window.setAudioLevel = (v) => { audioLevel = v; };
window.setActive = (on) => {
  active = on;
  if (!on) { smoothAudio = 0; }
  else { ensureRafRunning(); }  // D2: restart loop on activation
};
window.setProcessing = (on) => { processing = on; if (on) ensureRafRunning(); };
window.setError = (on) => {
  if (on) {
    // Flash red: temporarily override color via a CSS overlay
    const overlay = document.createElement('div');
    overlay.id = 'error-flash';
    overlay.style.cssText = 'position:fixed;inset:0;pointer-events:none;border:6px solid rgba(255,60,60,0.85);box-shadow:inset 0 0 60px rgba(255,0,0,0.4);transition:opacity 0.2s;z-index:9999;';
    document.body.appendChild(overlay);
    setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 800);
  }
};
// G3: Celebratory bright pulse on successful transcription
window.setCelebration = () => {
  ensureRafRunning();
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9998;border:4px solid rgba(180,120,255,0.0);box-shadow:inset 0 0 80px rgba(160,80,255,0.0);transition:none;';
  document.body.appendChild(el);
  // Quick burst: fade in bright white-violet, then out
  requestAnimationFrame(() => {
    el.style.transition = 'border-color 0.08s ease-out, box-shadow 0.08s ease-out';
    el.style.borderColor = 'rgba(220,180,255,0.9)';
    el.style.boxShadow = 'inset 0 0 100px rgba(180,100,255,0.55), 0 0 40px rgba(180,100,255,0.3)';
    setTimeout(() => {
      el.style.transition = 'border-color 0.45s ease-in, box-shadow 0.45s ease-in';
      el.style.borderColor = 'rgba(180,120,255,0.0)';
      el.style.boxShadow = 'inset 0 0 80px rgba(160,80,255,0.0)';
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
    }, 120);
  });
};
</script>
</body></html>
