<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent !important; }
canvas { position: fixed; top: 0; left: 0; background: transparent !important; }
</style>
</head><body>
<canvas id="gl"></canvas>
<script>
// ═══════════════════════════════════════════════
// Solar — warm orange/gold solar flare, radial burst
// ═══════════════════════════════════════════════

const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', { alpha: true, premultipliedAlpha: false, antialias: true });
if (!gl) { document.body.innerText = 'WebGL2 required'; }

let W, H, audioLevel = 0, smoothAudio = 0, active = false, fadeProgress = 0, processing = false;

function resize() {
  const dpr = window.devicePixelRatio || 2;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.onresize = resize;

const VS = `#version 300 es
in vec2 a_pos;
out vec2 vUv;
void main() { vUv = a_pos * 0.5 + 0.5; gl_Position = vec4(a_pos, 0, 1); }`;

const FS = `#version 300 es
precision highp float;
in vec2 vUv;
out vec4 fragColor;
uniform float uTime, uAudio, uFade, uProcessing;
uniform vec2 uRes;

vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0,0.5,1,2);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+2.0*C.xxx;vec3 x3=x0-1.0+3.0*C.xxx;
  i=mod289(i);
  vec4 p=permute(permute(permute(i.z+vec4(0,i1.z,i2.z,1))+i.y+vec4(0,i1.y,i2.y,1))+i.x+vec4(0,i1.x,i2.x,1));
  float n_=1.0/7.0;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m=m*m;return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

void main() {
  vec2 uv = vUv;
  float dT = uv.y, dB = 1.0 - uv.y, dL = uv.x, dR = 1.0 - uv.x;
  float dEdge = min(min(dT, dB), min(dL, dR));
  float depth = 0.07 + uAudio * 0.06;
  float flare = 1.0 - smoothstep(0.0, depth, dEdge);

  // Radial burst — solar prominences
  vec2 aspect = vec2(uRes.x / uRes.y, 1.0);
  float n1 = snoise(vec3(uv * aspect * 3.0, uTime * 0.5)) * 0.5 + 0.5;
  float n2 = snoise(vec3(uv * aspect * 7.0, uTime * 0.8 + 5.0)) * 0.5 + 0.5;
  float n3 = snoise(vec3(uv * aspect * 14.0, uTime * 1.2 + 10.0)) * 0.5 + 0.5;

  // Radial streaks from edges
  float angle = atan(uv.y - 0.5, (uv.x - 0.5) * aspect.x);
  float radialNoise = snoise(vec3(angle * 3.0, dEdge * 8.0, uTime * 0.6)) * 0.5 + 0.5;

  float waveBoost = 1.0 + uAudio * 2.5;
  float flameMask = n1 * 0.4 + n2 * 0.35 * waveBoost + radialNoise * 0.25 * waveBoost;
  flare = flare * (0.35 + flameMask * 0.65);
  flare *= (0.8 + uAudio * 0.45);
  flare = clamp(flare, 0.0, 0.8);

  float pm = uProcessing;
  // Solar: warm → processing shifts to cool blue
  vec3 deepRed    = mix(vec3(0.20, 0.03, 0.01), vec3(0.03, 0.05, 0.20), pm);
  vec3 ember      = mix(vec3(0.45, 0.10, 0.02), vec3(0.08, 0.15, 0.45), pm);
  vec3 orange     = mix(vec3(0.70, 0.28, 0.05), vec3(0.15, 0.30, 0.65), pm);
  vec3 gold       = mix(vec3(0.85, 0.50, 0.10), vec3(0.30, 0.50, 0.80), pm);
  vec3 brightGold = mix(vec3(0.95, 0.70, 0.25), vec3(0.55, 0.70, 0.90), pm);

  vec3 color;
  float t = flare;
  if (t < 0.15) color = mix(deepRed, ember, t / 0.15);
  else if (t < 0.4) color = mix(ember, orange, (t - 0.15) / 0.25);
  else if (t < 0.7) color = mix(orange, gold, (t - 0.4) / 0.3);
  else color = mix(gold, brightGold, (t - 0.7) / 0.3);

  color += vec3(n3 * 0.08, n2 * 0.04, 0.0) * flare;
  float breath = 0.82 + 0.18 * sin(uTime * 0.5);
  float alpha = flare * breath * uFade;
  alpha *= smoothstep(depth * 1.8, depth * 0.2, dEdge);
  fragColor = vec4(color * alpha, alpha);
}`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog); gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'uTime');
const uAudio = gl.getUniformLocation(prog, 'uAudio');
const uFade = gl.getUniformLocation(prog, 'uFade');
const uProc = gl.getUniformLocation(prog, 'uProcessing');
const uRes = gl.getUniformLocation(prog, 'uRes');
let smoothProcessing = 0;
let rafHandle = null;

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

function render() {
  rafHandle = requestAnimationFrame(render);
  smoothAudio = audioLevel > smoothAudio
    ? smoothAudio * 0.3 + audioLevel * 0.7
    : smoothAudio * 0.93 + audioLevel * 0.07;
  if (active && fadeProgress < 1) fadeProgress = Math.min(1, fadeProgress + 0.06);
  if (!active && fadeProgress > 0) fadeProgress = Math.max(0, fadeProgress - 0.02);
  smoothProcessing += (processing ? 1 : 0 - smoothProcessing) * 0.05;
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  if (fadeProgress > 0.01) {
    const t = performance.now() / 1000;
    gl.uniform1f(uTime, t);
    gl.uniform1f(uAudio, Math.min(smoothAudio * 3, 0.8));
    gl.uniform1f(uFade, fadeProgress);
    gl.uniform1f(uProc, smoothProcessing);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  } else if (!active) {
    cancelAnimationFrame(rafHandle);
    rafHandle = null;
  }
}
render();

function ensureRafRunning() { if (rafHandle === null) render(); }

window.setAudioLevel = (v) => { audioLevel = v; };
window.setActive = (on) => { active = on; if (!on) { smoothAudio = 0; } else { ensureRafRunning(); } };
window.setProcessing = (on) => { processing = on; if (on) ensureRafRunning(); };
window.setError = (on) => {
  if (on) {
    const overlay = document.createElement('div');
    overlay.id = 'error-flash';
    overlay.style.cssText = 'position:fixed;inset:0;pointer-events:none;border:6px solid rgba(255,60,60,0.85);box-shadow:inset 0 0 60px rgba(255,0,0,0.4);transition:opacity 0.2s;z-index:9999;';
    document.body.appendChild(overlay);
    setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 800);
  }
};
window.setCelebration = () => {
  ensureRafRunning();
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9998;border:4px solid rgba(255,160,0,0.0);box-shadow:inset 0 0 80px rgba(220,120,0,0.0);transition:none;';
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.transition = 'border-color 0.08s ease-out, box-shadow 0.08s ease-out';
    el.style.borderColor = 'rgba(255,220,80,0.9)';
    el.style.boxShadow = 'inset 0 0 100px rgba(220,150,30,0.55), 0 0 40px rgba(220,150,30,0.3)';
    setTimeout(() => {
      el.style.transition = 'border-color 0.45s ease-in, box-shadow 0.45s ease-in';
      el.style.borderColor = 'rgba(255,160,0,0.0)';
      el.style.boxShadow = 'inset 0 0 80px rgba(220,120,0,0.0)';
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 500);
    }, 120);
  });
};
</script>
</body></html>
